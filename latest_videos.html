
<html><head>
<style>
  :root { 
    --bordercolor: brown; 
    --boxcolor: white; 
    --feedbackcolor: gray; 
    --textcolor: black; 
  }
  .videoBlock {
    border: 1px solid var(--bordercolor);
    min-height: 65px;
    background-color: var(--boxcolor);
    display: flex;
  }
  .videoBlock:hover {
    background-color: var(--feedbackcolor);
  }
  .videoBlock a {
    text-decoration: none !important;
    flex: 1;
  }
  .videoBlock a:visited {
    color: var(--textcolor);
  }
  .videoBlock .mainlink {
    margin-bottom: 0rem;
    margin-top: 0.3rem;
    margin-right: 0.3rem;
    font-size: 110%;
    font-weight: bold;
    line-height: 1;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .videoBlock img {
    float: left;
    margin-right: 0.8rem;
    height: 65px;
  }
  .videoBlock .metadata {
    color: var(--textcolor);
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
</style>
</head>
<body>


<fieldset id="tag_filters"></fieldset>

<div id="feed_combined"></div>
  


<script>
var global_channels = [];

fetch('latest_videos.json')
  .then(response => response.json())
  .then(data => {process_channels(data)
  });

function process_channels(channels) {
  global_channels = channels;

  // Previously, I created a header and sorted feed for each category
  // Now I skip to the combined feed. 

  // Populate the entire feed
  channels.sort(channel_date_sorter);
  channels.forEach(channel => {
    document.getElementById('feed_combined').appendChild(create_video_block(channel));
  });
  
  // Collect all unique tags and build radio buttons.
  tags = [...new Set(channels.flatMap(c => c.tags || []))].sort(); //list of set of lists
  tags.unshift('all'); // Add 'all' as the first tag
  tags.forEach(tag => {
    document.getElementById('tag_filters').appendChild(create_tag_selector(tag));
  });

  // Filter to showing favorites by default.
  document.getElementById('tag_filters').querySelector('input[value="favorite"]').checked = true;
  filter_by_tag('favorite');
}

function create_video_block(channel) {
video_block = document.createElement('div');
video_block.className = 'videoBlock';
video_block.innerHTML = `
  <a href="https://www.youtube.com/embed/${channel.video_id}">
      <img src="https://i3.ytimg.com/vi/${channel.video_id}/mqdefault.jpg" alt="Thumbnail">
      <div class="mainlink">${channel.title}</div>
      <div class="metadata">${channel.author} - ${channel.date.slice(0, 10)}</div>
  </a>
`;
channel.element = video_block;
return video_block;
}

function create_tag_selector(tag) {
  // This creates a radio button with an onclick event that filters by the tag.
  tag_selector = document.createElement('label');
  tag_selector.className = 'tagSelector';
  tag_selector.innerHTML = `
    <input type="radio" name="tag_radio" value="${tag}" onclick="filter_by_tag('${tag}')">
    ${tag.charAt(0).toUpperCase() + tag.slice(1)}`; // title case the tag for display
  return tag_selector;
}

function channel_date_sorter (a,b) {
    return new Date(b.date) - new Date(a.date);
}

function filter_by_tag(tag) {
  global_channels.forEach(channel => {
    if (tag === 'all' || (channel.tags || []).includes(tag)) {
      channel.element.style.display = '';
    } else {
      channel.element.style.display = 'none';
    }
  });
}

</script>
  

</body></html>
